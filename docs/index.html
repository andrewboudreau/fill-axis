<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fill Axis</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="engine/crypto.js"></script>
<script src="engine/storage.js"></script>
<script src="engine/debug.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --border: #0f3460;
    --accent: #e94560;
    --p1: #4fc3f7;
    --p1-dim: rgba(79,195,247,0.18);
    --p2: #ff8a65;
    --p2-dim: rgba(255,138,101,0.18);
    --contested: rgba(255,235,59,0.22);
    --cell: #0d1b2a;
    --cell-hover: #1a2f47;
    --text: #e0e0e0;
    --muted: #888;
    --elim: #ff1744;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  #app { display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 16px; }
  h1 { font-size: 2rem; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; }
  #subtitle { color: var(--muted); font-size: 0.85rem; letter-spacing: 2px; }

  /* LOBBY */
  #lobby { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; max-width: 400px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 100%; }
  .card h2 { font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
  input[type=text] { width: 100%; background: var(--cell); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 6px; font-size: 1rem; outline: none; }
  input[type=text]:focus { border-color: var(--accent); }
  button { cursor: pointer; border: none; border-radius: 6px; padding: 10px 20px; font-size: 0.95rem; font-weight: 600; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 10px; }
  .btn-secondary { background: var(--border); color: var(--text); width: 100%; margin-top:8px; }
  .room-code { font-size: 2rem; font-weight: 800; letter-spacing: 6px; color: var(--accent); text-align: center; padding: 12px; background: var(--cell); border-radius: 6px; margin: 10px 0; }
  #status-msg { color: var(--muted); font-size: 0.85rem; text-align: center; min-height: 20px; }
  select { width: 100%; background: var(--cell); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 6px; font-size: 0.95rem; outline: none; }

  /* GAME */
  #game { display: none; flex-direction: column; align-items: center; gap: 14px; width: 100%; }
  #turn-banner { font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; padding: 8px 24px; border-radius: 20px; }
  .banner-p1 { background: var(--p1-dim); color: var(--p1); border: 1px solid var(--p1); }
  .banner-p2 { background: var(--p2-dim); color: var(--p2); border: 1px solid var(--p2); }
  .banner-reveal { background: rgba(233,69,96,0.18); color: var(--accent); border: 1px solid var(--accent); }

  #game-area { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }

  /* TRAY */
  .tray { display: flex; flex-direction: column; gap: 10px; min-width: 120px; }
  .tray-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; text-align: center; }
  .tray-piece { display: flex; align-items: center; gap: 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; cursor: grab; user-select: none; transition: border-color 0.15s, transform 0.1s; }
  .tray-piece:hover { border-color: var(--accent); transform: scale(1.04); }
  .tray-piece.empty { opacity: 0.3; cursor: default; pointer-events: none; }
  .tray-piece.dragging { opacity: 0.4; }
  .piece-icon { font-size: 1.5rem; width: 32px; text-align: center; }
  .piece-info { display: flex; flex-direction: column; }
  .piece-name { font-size: 0.8rem; font-weight: 700; }
  .piece-count { font-size: 0.75rem; color: var(--muted); }

  /* BOARD */
  #board-wrap { position: relative; }
  #board { display: grid; border: 2px solid var(--border); border-radius: 4px; user-select: none; }
  .cell {
    width: 60px; height: 60px;
    background: var(--cell);
    border: 1px solid #1e3050;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    position: relative;
    transition: background 0.12s;
    cursor: default;
  }
  .cell.drop-target { background: var(--cell-hover); cursor: copy; }
  .cell.drop-target:hover { background: #253d5c; }
  .cell.drop-invalid { background: rgba(233,69,96,0.15); cursor: not-allowed; }
  .cell.attack-p1 { background: var(--p1-dim); }
  .cell.attack-p2 { background: var(--p2-dim); }
  .cell.attack-contested { background: var(--contested); }
  .cell.eliminating { animation: elimAnim 0.6s ease-out; }

  .tile-token {
    width: 44px; height: 44px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    border: 2px solid transparent;
    pointer-events: none;
  }
  .tile-p1 { background: rgba(79,195,247,0.25); border-color: var(--p1); }
  .tile-p2 { background: rgba(255,138,101,0.25); border-color: var(--p2); }
  .tile-hidden { background: rgba(255,255,255,0.08); border-color: #444; font-size: 1rem; color: #666; }
  .tile-dead { opacity: 0.25; border-color: var(--elim) !important; }

  /* DRAG GHOST */
  #drag-ghost { position: fixed; pointer-events: none; z-index: 1000; display: none; font-size: 2rem; transform: translate(-50%, -50%); }

  /* SCORES */
  #scores { display: flex; gap: 32px; }
  .score-box { text-align: center; padding: 10px 20px; border-radius: 8px; }
  .score-box.p1 { background: var(--p1-dim); border: 1px solid var(--p1); }
  .score-box.p2 { background: var(--p2-dim); border: 1px solid var(--p2); }
  .score-val { font-size: 2rem; font-weight: 800; }
  .score-name { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* END GAME */
  #end-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 500; align-items: center; justify-content: center; }
  #end-card { background: var(--panel); border: 2px solid var(--accent); border-radius: 16px; padding: 40px; text-align: center; max-width: 360px; }
  #end-title { font-size: 2.5rem; font-weight: 900; color: var(--accent); margin-bottom: 8px; }
  #end-sub { color: var(--muted); margin-bottom: 24px; font-size: 1rem; }
  #end-scores { display: flex; gap: 24px; justify-content: center; margin-bottom: 24px; }

  /* FINISH BTN */
  #finish-btn { display: none; }

  @keyframes elimAnim {
    0% { background: rgba(255,23,68,0.5); transform: scale(1.1); }
    100% { background: var(--cell); transform: scale(1); }
  }

  .legend { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; font-size: 0.78rem; color: var(--muted); }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .leg-box { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
</style>
<script src="engine/version.js"></script>
</head>
<body>
<script>
  // Legacy realtime game page retired — all games now in lobby
  window.location.replace('lobby.html');
</script>
<noscript><a href="lobby.html">Go to Lobby</a></noscript>
</body>
</html>
