<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fill Axis — Game</title>
<script src="engine/crypto.js"></script>
<script src="engine/storage.js"></script>
<script src="engine/identity.js"></script>
<script src="engine/pieces.js"></script>
<script src="engine/board.js"></script>
<script src="engine/game.js"></script>
<script src="engine/async-game.js"></script>
<script src="engine/debug.js"></script>
<style>
:root{--bg:#1a1a2e;--panel:#16213e;--border:#0f3460;--accent:#e94560;--p1:#4fc3f7;--p1bg:rgba(79,195,247,.1);
  --p2:#ff8a65;--p2bg:rgba(255,138,101,.1);--green:#69f0ae;--yellow:#ffd54f;--red:#ff5252;
  --cell:#0d1b2a;--text:#e0e0e0;--muted:#778;--mono:'Fira Mono','Consolas',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;}
nav{display:flex;gap:6px;background:var(--panel);padding:10px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
nav a{color:var(--muted);text-decoration:none;padding:5px 12px;border-radius:4px;font-size:.88rem;}
nav a:hover{background:rgba(233,69,96,.15);color:var(--accent);}
#nav-code{font-family:var(--mono);font-weight:800;letter-spacing:3px;color:var(--accent);margin-left:auto;font-size:.9rem;}
.page{max-width:860px;margin:0 auto;padding:20px 16px;}
.banner{padding:10px 18px;border-radius:8px;font-size:.95rem;font-weight:700;margin-bottom:14px;text-align:center;}
.banner.myturn{background:var(--p1bg);border:1px solid var(--p1);color:var(--p1);}
.banner.theirturn{background:rgba(255,213,79,.08);border:1px solid var(--yellow);color:var(--yellow);}
.banner.waiting{background:rgba(79,195,247,.08);border:1px solid var(--border);color:var(--muted);}
.banner.reveal{background:rgba(233,69,96,.12);border:1px solid var(--accent);color:var(--accent);}
.banner.final{background:rgba(105,240,174,.1);border:1px solid var(--green);color:var(--green);}
.layout{display:grid;grid-template-columns:130px 1fr 130px;gap:16px;align-items:start;}
@media(max-width:600px){.layout{grid-template-columns:1fr;}}
.tray{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;}
.tray-title{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.piece-item{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:6px;border:1px solid var(--border);
  margin-bottom:6px;cursor:grab;background:var(--cell);transition:border-color .12s;}
.piece-item:hover{border-color:var(--accent);}
.piece-item.empty{opacity:.3;pointer-events:none;}
.piece-item.dragging{opacity:.4;}
.pi-icon{font-size:1.2rem;width:24px;text-align:center;}
.pi-info{font-size:.72rem;line-height:1.3;}
.pi-name{font-weight:700;}
.pi-count{color:var(--muted);}
.board-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;}
#board{display:grid;border:2px solid var(--border);border-radius:4px;}
.cell{width:64px;height:64px;background:var(--cell);border:1px solid #1e3050;display:flex;
  align-items:center;justify-content:center;font-size:1.4rem;position:relative;cursor:default;transition:background .1s;}
.cell.drop-ok{background:#1a2f47;cursor:copy;}
.cell.drop-ok:hover{background:#253d5c;}
.cell.drop-bad{background:rgba(233,69,96,.12);cursor:not-allowed;}
.cell.atk-p1{background:rgba(79,195,247,.12);}
.cell.atk-p2{background:rgba(255,138,101,.12);}
.cell.atk-both{background:rgba(255,235,59,.1);}
.tile{width:48px;height:48px;border-radius:8px;border:2px solid transparent;display:flex;
  align-items:center;justify-content:center;font-size:1.2rem;pointer-events:none;}
.tile-p1{background:rgba(79,195,247,.2);border-color:var(--p1);}
.tile-p2{background:rgba(255,138,101,.2);border-color:var(--p2);}
.tile-hidden{background:rgba(255,255,255,.06);border-color:#2a3550;font-size:.9rem;color:#556;}
.tile-dead{opacity:.22;}
#drag-ghost{position:fixed;pointer-events:none;z-index:1000;display:none;font-size:2rem;transform:translate(-50%,-50%);}
.scores{display:flex;gap:12px;justify-content:center;}
.score-box{text-align:center;padding:8px 16px;border-radius:6px;min-width:80px;}
.score-box.p1{background:var(--p1bg);border:1px solid var(--p1);}
.score-box.p2{background:var(--p2bg);border:1px solid var(--p2);}
.score-val{font-size:1.6rem;font-weight:900;}
.score-name{font-size:.72rem;color:var(--muted);}
.actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
button{cursor:pointer;border:none;border-radius:6px;padding:9px 20px;font-size:.88rem;font-weight:700;}
button:hover{opacity:.83;}
.btn-a{background:var(--accent);color:#fff;}
.btn-b{background:var(--border);color:var(--text);}
.status-bar{font-size:.78rem;color:var(--muted);text-align:center;padding:6px;min-height:24px;}
.status-bar.ok{color:var(--green);}
.status-bar.err{color:var(--red);}
.poll-dot{display:inline-block;width:6px;height:6px;background:var(--yellow);border-radius:50%;margin-right:4px;
  animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.2;}50%{opacity:1;}}
.phase-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:14px;}
.phase-card h3{font-size:.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.val{font-family:var(--mono);font-size:.7rem;background:var(--cell);padding:6px 9px;border-radius:4px;
  word-break:break-all;border:1px solid var(--border);margin:4px 0;}
.val.ok{border-color:var(--green);color:var(--green);}
.val.bad{border-color:var(--red);color:var(--red);}
.val.hash{color:var(--yellow);}
</style>
<script src="engine/version.js"></script>
</head>
<body>
<script>
  // Legacy async game page retired — all games now use unified game.html
  window.location.replace('lobby.html');
</script>

</body>
</html>
